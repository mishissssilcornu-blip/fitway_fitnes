<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація (крок 2/2)</title>
    <link rel="stylesheet" href="style/css1.css">
</head>
<body>

    <div class="registration-container cyber-cut">
        
        <div class="step-label">
            <span>02 ЕТАП</span>
        </div>

        <h1>ТВОЇ ДАНІ</h1>
        <p class="subtitle">Налаштуй профіль під свої параметри</p>

        <form id="form-step-2">
            
            <div class="form-group">
                <label for="birthdate">ДАТА НАРОДЖЕННЯ</label>
                <div class="input-wrapper">
                    <span class="icon">📅</span>
                    <input type="date" id="birthdate" name="birthdate" required>
                </div>
            </div>

            <div class="form-group">
                <label for="gender">СТАТЬ</label>
                <div class="input-wrapper">
                    <span class="icon">🧬</span>
                    <select id="gender" name="gender" required>
                        <option value="male">Чоловіча</option>
                        <option value="female">Жіноча</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="weight">ВАГА (КГ)</label>
                    <div class="input-wrapper">
                        <span class="icon">⚖️</span>
                        <input type="number" id="weight" name="weight" placeholder="70" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="height">ЗРІСТ (СМ)</label>
                    <div class="input-wrapper">
                        <span class="icon">📏</span>
                        <input type="number" id="height" name="height" placeholder="175" required>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button type="button" id="btn-back" class="btn-secondary">Назад</button>
                <button type="submit" class="btn-submit">Створити акаунт 🚀</button>
            </div>
        </form>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
